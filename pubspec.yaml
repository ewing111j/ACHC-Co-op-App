name: achc_hub
description: ACHC Hub - Aquinas Columbus Homeschool Community App
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Firebase core
  firebase_core: 3.6.0
  firebase_auth: 5.3.1
  cloud_firestore: 5.4.3
  firebase_database: 11.1.4
  firebase_storage: 12.3.2
  firebase_messaging: 15.1.3

  # State management
  provider: 6.1.5+1

  # HTTP / Networking
  http: 1.5.0

  # Local storage & offline
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # UI utilities
  cached_network_image: 3.3.1
  image_picker: 1.1.2
  intl: 0.19.0
  url_launcher: 6.3.1
  share_plus: 10.1.4
  flutter_local_notifications: 18.0.1
  table_calendar: 3.1.2
  file_picker: 8.1.3
  photo_view: 0.15.0
  badges: 3.1.2
  shimmer: 3.0.0
  timeago: 3.7.0
  uuid: 4.5.1
  # Animations (flutter_animate only — no rive, no lottie)
  flutter_animate: ^4.5.0

  # Memory Work module
  just_audio: 0.9.41

  # P3-1: Speech-to-text (on-device, privacy-safe)
  speech_to_text: 6.6.0

  # P3-3: Charts for admin analytics
  fl_chart: 0.69.0

  # PDF printing
  printing: 5.14.2
  pdf: 3.11.1

  # Encryption
  encrypt: 5.0.3
  crypto: 3.0.5

  # Connectivity / offline
  connectivity_plus: 6.1.4
  pdfx: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: 2.0.1
  build_runner: 2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/lumen/
    - assets/lumen/cosmetics/
    - assets/battle/
    - assets/subjects/
