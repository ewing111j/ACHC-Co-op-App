name: achc_hub
description: ACHC Hub - Homeschool Co-op Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Firebase
  firebase_core: 3.6.0
  firebase_auth: 5.3.1
  cloud_firestore: 5.4.3
  firebase_storage: 12.3.2
  firebase_messaging: 15.1.3

  # State management
  provider: 6.1.5+1

  # HTTP / Networking
  http: 1.5.0

  # Local storage
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # UI utilities
  cached_network_image: 3.3.1
  image_picker: 1.1.2
  intl: 0.19.0
  url_launcher: 6.3.1
  flutter_local_notifications: 18.0.1
  table_calendar: 3.1.2
  file_picker: 8.1.3
  photo_view: 0.15.0
  badges: 3.1.2
  shimmer: 3.0.0
  timeago: 3.7.0
  uuid: 4.5.1
  lottie: 3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: 2.0.1
  build_runner: 2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
